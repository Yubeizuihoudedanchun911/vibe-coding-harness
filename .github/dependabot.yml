version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: chore
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-build:
        patterns:
          - setuptools
          - build
          - twine
    commit-message:
      prefix: chore
